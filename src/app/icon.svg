<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    /* Adapts to the browser/OS theme so the mark stays legible on a light or
       dark tab bar. The dot keeps the brass accent in both. */
    .ring { stroke: #1b1a17; }
    .dot  { fill: #b08a4e; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #e9e4d8; }
      .dot  { fill: #c9ad79; }
    }
  </style>
  <g transform="translate(2.4 2.4) scale(0.85)" fill="none" stroke-width="3">
    <path class="ring" d="M27.5 12.4A12 12 0 1 0 28 16" stroke-linecap="round" />
    <circle class="dot" cx="28" cy="9.4" r="2.2" stroke="none" />
  </g>
</svg>
